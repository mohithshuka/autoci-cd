apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoci-app
  labels:
    app: autoci-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoci-app
  template:
    metadata:
      labels:
        app: autoci-app
    spec:
      containers:
        - name: autoci-app
          image: autoci-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: autoci-app-service
spec:
  selector:
    app: autoci-app
  ports:
    - port: 80
      targetPort: 3000
  type: NodePort
